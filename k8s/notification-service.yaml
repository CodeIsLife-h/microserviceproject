apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - "until nc -z postgres-notification 5432; do echo waiting for postgres-notification; sleep 2; done"
        - name: wait-for-rabbitmq
          image: busybox
          command:
            - sh
            - -c
            - "until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"
      containers:
        - name: notification-service
          image: microservicesproject-notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-notification:5432/notificationdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-config
                  key: SPRING_RABBITMQ_HOST
            - name: SPRING_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-config
                  key: SPRING_MAIL_HOST
            - name: SPRING_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-config
                  key: SPRING_MAIL_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
